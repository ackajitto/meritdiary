<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บันทึกบุญ</title>
    
    <!-- นำเข้า Firebase SDK ในรูปแบบ Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-body: #e8f5e9;
            --bg-container: #ffffff;
            --text-primary: #1b5e20;
            --text-regular: #2c3e50;
            --text-muted: #555555;
            --border-color: #c8e6c9;
            --card-bg: #f1f8e9;
            --card-border: #dcedc8;
            --input-bg: #fafafa;
            --button-add: #4caf50;
            --button-add-hover: #388e3c;
            --shadow: rgba(0, 0, 0, 0.1);
            --toast-bg: rgba(33, 33, 33, 0.95);
            --toast-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg-body: #121b14;
            --bg-container: #1c281e;
            --text-primary: #81c784;
            --text-regular: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #2e4a33;
            --card-bg: #233326;
            --card-border: #2e4231;
            --input-bg: #151e16;
            --button-add: #2e7d32;
            --button-add-hover: #1b5e20;
            --shadow: rgba(0, 0, 0, 0.3);
            --toast-bg: rgba(250, 250, 250, 0.95);
            --toast-text: #121212;
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body { 
            font-family: 'Sarabun', 'Arial', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-regular);
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 16px; 
            font-size: 18px; /* เพิ่มขนาดอักษรเริ่มต้นสำหรับมือถือและไอแพด */
        }

        .container { 
            background-color: var(--bg-container); 
            padding: 24px; 
            padding-top: 60px; /* เว้นระยะด้านบนเพื่อป้องกัน Username ทับกับหัวข้อ */
            border-radius: 16px; 
            box-shadow: 0 10px 30px var(--shadow); 
            width: 100%; 
            max-width: 680px; /* ขยายขนาดสูงสุดของคอนเทนเนอร์ให้รับกับหน้าจอไอแพดพอดี */
            position: relative;
        }

        h1 { 
            text-align: center; 
            color: var(--text-primary); 
            margin-top: 10px;
            margin-bottom: 15px; 
            font-size: 2.4em; 
            font-weight: bold;
        }

        /* ปุ่มสลับโหมดมืด (Dark Mode Button) */
        .theme-toggle-btn {
            position: absolute;
            top: 15px;
            left: 20px;
            background: none;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3em;
            color: var(--text-primary);
            box-shadow: 0 2px 8px var(--shadow);
        }

        /* ส่วนล็อกอิน */
        .login-box { 
            text-align: center; 
            margin-bottom: 25px; 
            padding: 30px 20px; 
            background-color: var(--card-bg); 
            border-radius: 12px; 
            border: 1px solid var(--card-border);
        }

        .google-btn { 
            background-color: #4285f4; 
            color: white; 
            border: none; 
            padding: 16px 28px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.1em; 
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .google-btn:hover { background-color: #357ae8; }

        /* ข้อมูลผู้ใช้งานขนาดกะทัดรัดที่ขวาบนสุด */
        .user-info-top { 
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85em;
            color: var(--text-muted);
            background-color: var(--card-bg);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid var(--card-border);
            max-width: 60%;
        }

        .user-info-top span {
            font-weight: bold;
            color: var(--text-primary);
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-small-btn { 
            background-color: #ef5350; 
            color: white; 
            border: none; 
            padding: 4px 10px; 
            border-radius: 15px; 
            cursor: pointer; 
            font-size: 0.9em;
            font-weight: bold;
        }
        .logout-small-btn:hover { background-color: #d32f2f; }

        .total-merit-bar { 
            background-color: var(--border-color); 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            font-size: 1.4em; 
            font-weight: bold; 
            color: var(--text-primary); 
            margin-bottom: 25px; 
            box-shadow: 0 4px 10px var(--shadow);
        }

        /* ส่วนฟอร์มรับข้อมูล */
        .input-section { 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
            margin-bottom: 25px; 
        }
        
        .input-row { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            align-items: center;
        }
        
        select, input[type="text"], input[type="number"] { 
            padding: 14px 18px; 
            border: 2px solid var(--border-color); 
            border-radius: 10px; 
            outline: none; 
            font-size: 1.05em;
            background-color: var(--input-bg);
            color: var(--text-regular);
            width: 100%;
        }

        select:focus, input:focus {
            border-color: var(--text-primary);
        }
        
        /* ปรับสัดส่วนให้ช่องจำนวนเงินมีระยะเหมาะสมบนมือถือ/แท็บเล็ต */
        .input-row input[type="number"] {
            width: 160px;
            flex-grow: 0;
        }
        
        .add-btn { 
            padding: 14px 24px; 
            background-color: var(--button-add); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.05em; 
            font-weight: bold;
            flex-grow: 0;
            white-space: nowrap;
            box-shadow: 0 4px 10px var(--shadow);
        }
        .add-btn:hover { background-color: var(--button-add-hover); }
        
        .merit-list ul { 
            list-style: none; 
            padding: 0; 
            margin: 0;
        }

        .merit-list li { 
            background-color: var(--card-bg); 
            padding: 20px; 
            margin-bottom: 14px; 
            border-radius: 12px; 
            border: 1px solid var(--card-border); 
            box-shadow: 0 2px 8px var(--shadow);
        }

        .merit-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
            gap: 10px;
        }

        .merit-title { 
            font-weight: bold; 
            color: var(--text-regular);
            font-size: 1.15em;
            line-height: 1.4;
        }

        .merit-amount { 
            font-weight: bold; 
            color: var(--text-primary); 
            white-space: nowrap;
            font-size: 1.25em;
        }
        
        .merit-details { 
            margin-top: 20px; 
            border-top: 2px solid var(--card-border); 
            padding-top: 20px; 
        }

        .merit-actions { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            margin-bottom: 20px; 
        }

        .merit-actions input { 
            padding: 12px; 
            border: 2px solid var(--card-border); 
            border-radius: 8px; 
            font-size: 1em;
        }

        .merit-actions button {
            background-color: var(--button-add);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
        }
        .merit-actions button:hover { background-color: var(--button-add-hover); }
        
        .merit-transactions-list { 
            list-style: none; 
            padding: 0; 
            margin: 0 0 15px 0; 
        }

        .merit-transactions-list li { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: var(--bg-container); 
            padding: 12px 16px; 
            border: 1px solid var(--card-border);
            margin-bottom: 6px; 
            border-radius: 8px;
            font-size: 0.95em;
            gap: 15px; /* เว้นวรรคขั้นกลางระหว่างข้อความและจำนวนเงิน */
        }

        /* ปรับสไตล์ให้ข้อความ/ลิงก์รายละเอียดสามารถตัดคำขึ้นบรรทัดใหม่ได้เอง ไม่ทะลุออกนอกกรอบ */
        .merit-transactions-list li span:first-child {
            color: var(--text-regular);
            line-height: 1.4;
            flex: 1; /* ช่วยดันให้ขยายครอบคลุมพื้นที่ที่เหลือ */
            min-width: 0; /* สำคัญ: บังคับให้สิทธิ์ CSS ในการตัดคำทำงานได้อย่างสมบูรณ์ใน Flexbox */
            word-break: break-all; /* ป้องกันข้อความหรือ URL ยาวเหยียดทะลุออกนอกขอบ */
            overflow-wrap: break-word; /* รองรับการตัดข้อความเบราว์เซอร์สมัยใหม่ */
        }

        .merit-transactions-list li span:last-child {
            white-space: nowrap; /* ตรึงจำนวนเงินด้านขวาให้อยู่บรรทัดเดียวกันเสมอ */
            flex-shrink: 0;
        }
        
        .delete-btn { 
            background-color: #f44336; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            padding: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold;
            font-size: 1.05em;
            margin-top: 5px;
        }
        .delete-btn:hover { background-color: #d32f2f; }
        
        a { 
            color: #2196f3; 
            text-decoration: none; 
            font-weight: bold;
            word-break: break-all; /* ช่วยสลายคำในแท็ก a หากลิงก์มีลักษณะยาวต่อเนื่องกัน */
        }
        a:hover { 
            text-decoration: underline; 
        }

        #toast {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toast-bg);
            color: var(--toast-text);
            padding: 16px 32px;
            border-radius: 30px;
            z-index: 1000;
            font-size: 1.1em;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
            font-weight: bold;
        }

        #confirmModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1001;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .confirm-box {
            background: var(--bg-container);
            padding: 30px;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid var(--card-border);
        }

        .confirm-box p {
            margin: 0 0 25px 0;
            font-weight: bold;
            color: var(--text-regular);
            font-size: 1.2em;
            line-height: 1.5;
        }

        .confirm-btns {
            display: flex;
            gap: 14px;
            justify-content: center;
        }

        .confirm-btn-yes {
            background-color: #ef5350;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
            flex: 1;
        }
        .confirm-btn-yes:hover { background-color: #d32f2f; }

        .confirm-btn-no {
            background-color: #e0e0e0;
            color: #333;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
            flex: 1;
        }
        .confirm-btn-no:hover { background-color: #bdbdbd; }
    </style>
</head>
<body>
<div class="container">
    <!-- ปุ่มเลือกสลับโหมดมืด / โหมดสว่าง -->
    <button id="themeToggle" class="theme-toggle-btn" aria-label="สลับโหมดถนอมสายตา">🌙</button>

    <!-- หัวข้อเดี่ยว "บันทึกบุญ" -->
    <h1>บันทึกบุญ</h1>
    
    <!-- ข้อมูลผู้ใช้ล็อกอิน (แสดงขวาบนสุด ขนาดกะทัดรัด) -->
    <div id="userInfo" class="user-info-top" style="display:none">
        👤 <span id="userName"></span>
        <button id="logoutBtn" class="logout-small-btn">ออก</button>
    </div>

    <!-- ส่วนล็อกอินก่อนเข้าใช้งาน -->
    <div id="loginBox" class="login-box">
        <button id="loginBtn" class="google-btn">🔐 ล็อกอินด้วย Google เพื่อเริ่มบันทึก</button>
    </div>

    <!-- แถบยอดรวมทั้งหมด (จะซ่อนไว้จนกว่าจะล็อกอินเรียบร้อย) -->
    <div id="totalMeritBar" class="total-merit-bar" style="display: none;">💰 ยอดบุญรวม: 0 บาท</div>

    <!-- ส่วนกรอกข้อมูลเพิ่มบุญใหม่ -->
    <div id="inputForm" class="input-section" style="display: none;">
        <input type="text" id="manualMeritInput" placeholder="พิมพ์ชื่อรายการบุญเอง (หากไม่มีในรายการด้านล่าง)">
        <select id="meritSelect">
            <option value="">-- เลือกบุญแนะนำ --</option>
            <option value="บูชาธรรมหลวงพ่อ">บูชาธรรมหลวงพ่อ</option>
            <option value="บูชาข้าวพระ">บูชาข้าวพระ</option>
            <option value="บวชพระ">บวชพระ</option>
            <option value="ทอดกฐินปี 2569">ทอดกฐินปี 2569</option>
            <option value="พระไตรปิฎกฉบับธรรมชัย">พระไตรปิฎกฉบับธรรมชัย</option>
            <option value="การศึกษาพระภิกษุ-สามเณร,บัณฑิตถาวร">การศึกษาพระภิกษุ-สามเณร,บัณฑิตถาวร</option>
            <option value="ยา,อุปกรณ์การแพทย์เพื่อพระภิกษุอาพาธ">ยา,อุปกรณ์การแพทย์เพื่อพระภิกษุอาพาธ</option>
            <option value="แสงสว่าง บูชามหาธรรมกายเจดีย์">แสงสว่าง บูชามหาธรรมกายเจดีย์</option>
            <option value="ภัตตาหาร">ภัตตาหาร</option>
            <option value="ข้าวสาร">ข้าวสาร</option>
            <option value="ปานะ">ปานะ</option>
            <option value="ปล่อยสัตว์ปล่อยปลา">ปล่อยสัตว์ปล่อยปลา</option>
            <option value="รัตนบุปผาบูชาพระมหาธรรมกายเจดีย์">รัตนบุปผาบูชาพระมหาธรรมกายเจดีย์</option>
            <option value="วัดภาคใต้ 323 วัด">วัดภาคใต้ 323 วัด</option>
            <option value="เผยแผ่ธรรมะออนไลน์และบำรุงวัด">เผยแผ่ธรรมะออนไลน์และบำรุงวัด</option>
            <option value="บุปผามาลาบูชาพระรัตนตรัย,มหาปูชนียาจารย์">บุปผามาลาบูชาพระรัตนตรัย,มหาปูชนียาจารย์</option>
            <option value="ดอกกุหลาบบูชาพระมหาธรรมกายเจดีย์">ดอกกุหลาบบูชาพระมหาธรรมกายเจดีย์</option>
            <option value="ธรรมะเพื่อประชาชน">ธรรมะเพื่อประชาชน</option>
            <option value="บุพเปตพลี,พิธีอุทิศส่วนกุศลวันพระใหญ่">บุพเปตพลี,พิธีอุทิศส่วนกุศลวันพระใหญ่</option>
            <option value="บำรุงวัด ค่าน้ำ ค่าไฟ">บำรุงวัด ค่าน้ำ ค่าไฟ</option>
            <option value="เศรษฐีถาวร">เศรษฐีถาวร</option>
            <option value="ผ้าไตรจีวร,อัฏฐบริขาร">ผ้าไตรจีวร,อัฏฐบริขาร</option>
            <option value="ดอกบัวบูชาเจดีย์">ดอกบัวบูชาเจดีย์</option>
            <option value="ยานพาหนะ">ยานพาหนะ</option>
            <option value="สื่อธรรมะ">สื่อธรรมะ</option>
        </select>
        <div class="input-row">
            <input type="number" id="meritAmountInput" placeholder="จำนวนเงิน">
            <button id="addMeritBtn" class="add-btn">+ เพิ่มบุญใหม่</button>
        </div>
    </div>

    <!-- รายชื่อรายการบุญที่ถูกดึงมาจากระบบคลาวด์ -->
    <div class="merit-list"><ul id="meritList"></ul></div>
</div>

<!-- โครงสร้าง Dialog และ Toast แบบ Custom แทน Alert / Confirm ดั้งเดิม เพื่อความลื่นไหลใน Safari และ iOS -->
<div id="toast"></div>
<div id="confirmModal">
    <div class="confirm-box">
        <p id="confirmMessage"></p>
        <div class="confirm-btns">
            <button id="confirmYes" class="confirm-btn-yes">ยืนยัน</button>
            <button id="confirmNo" class="confirm-btn-no">ยกเลิก</button>
        </div>
    </div>
</div>

<script>
    // ตรวจสอบการตั้งค่าและเปิดใช้งาน Dark Mode ทันทีที่หน้าจอโหลดเสร็จ
    const currentTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    updateThemeButtonIcon(currentTheme);

    // ฟังก์ชันในการสลับธีมของตัวเว็บ
    document.getElementById('themeToggle').addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        let newTheme = (theme === 'dark') ? 'light' : 'dark';
        
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeButtonIcon(newTheme);
    });

    function updateThemeButtonIcon(theme) {
        const btn = document.getElementById('themeToggle');
        if (theme === 'dark') {
            btn.innerText = '☀️';
        } else {
            btn.innerText = '🌙';
        }
    }

    // กำหนดค่าการเชื่อมโยงข้อมูลกับ Firebase Realtime Database
    const firebaseConfig = {
        apiKey: "AIzaSyBW_KT7TJAThSg29gedQurkXhcTv5ACOmg",
        authDomain: "dharma-prayer.firebaseapp.com",
        databaseURL: "https://dharma-prayer-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "dharma-prayer",
        storageBucket: "dharma-prayer.firebasestorage.app",
        messagingSenderId: "4576358277",
        appId: "1:4576358277:web:17240edf90e461cb489eec"
    };

    // เชื่อมต่อบริการของทาง Firebase SDK
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let merits = [];
    let uid = null;

    // ระบบ Custom Toast ใช้งานแทน alert() ป้องกันการสะดุดบน iPad/iOS
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.innerText = message;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    // ระบบ Custom Confirm Modal ใช้งานแทน confirm() เพื่อความสวยงามกลมกลืนกับธีม
    function showConfirm(message, callback) {
        const modal = document.getElementById('confirmModal');
        const confirmMessage = document.getElementById('confirmMessage');
        const confirmYes = document.getElementById('confirmYes');
        const confirmNo = document.getElementById('confirmNo');

        confirmMessage.innerText = message;
        modal.style.display = 'flex';

        confirmYes.onclick = () => {
            modal.style.display = 'none';
            callback();
        };

        confirmNo.onclick = () => {
            modal.style.display = 'none';
        };
    }

    // แปลงเวลาให้เป็นโครงสร้างวันของประเทศไทย
    function getCurrentDateTime() {
        const now = new Date();
        const day = now.getDate().toString().padStart(2, '0');
        const month = (now.getMonth() + 1).toString().padStart(2, '0');
        const year = now.getFullYear();
        const time = now.toTimeString().substring(0, 5);
        return `${day}/${month}/${year} ${time}`;
    }

    // ทำการลิงก์คำอธิบายที่เป็น URL ให้เปิดหน้าต่างใหม่ของเบราว์เซอร์ได้
    function linkify(text) {
        if (!text) return "";
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, url => `<a href="${url}" target="_blank">${url}</a>`);
    }

    // ฟังก์ชันในการแสดงผลสกุลเงินเป็นรูปแบบสกุลบาท (ปรับแต่งแก้ไขเว้นวรรค 1 เคาะหลังสัญลักษณ์ ฿)
    function formatCurrency(amount) {
        const formatted = new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', minimumFractionDigits: 0 }).format(amount);
        return formatted.replace('฿', '฿ ');
    }

    function updateTotal() {
        const total = merits.reduce((sum, m) => sum + (parseFloat(m.totalAmount) || 0), 0);
        document.getElementById('totalMeritBar').innerText = `💰 ยอดบุญรวม: ${formatCurrency(total)}`;
    }

    // เรนเดอร์สร้างรายการบุญบน HTML DOM
    function renderMerits() {
        const list = document.getElementById('meritList');
        list.innerHTML = '';
        
        merits.forEach((merit, index) => {
            const li = document.createElement('li');
            
            if (!merit.transactions) {
                merit.transactions = [];
                if (merit.totalAmount && merit.totalAmount > 0) {
                    merit.transactions.push({ amount: merit.totalAmount, date: getCurrentDateTime(), note: 'ข้อมูลเดิม' });
                }
            }

            li.innerHTML = `
                <div class="merit-header" onclick="toggleExpand(${index})">
                    <span class="merit-title">${index + 1}. ${merit.description}</span>
                    <span class="merit-amount">${formatCurrency(merit.totalAmount)}</span>
                </div>
                ${merit.expanded ? `
                <div class="merit-details">
                    <div class="merit-actions" onclick="event.stopPropagation()">
                        <input type="number" id="addAmt${index}" placeholder="จำนวน/บาท" style="width: 120px;">
                        <input type="text" id="addDesc${index}" placeholder="รายละเอียด/ลิงก์" style="flex-grow: 1;">
                        <button onclick="updateMeritAmount(${index})">เพิ่ม</button>
                    </div>
                    <ul class="merit-transactions-list">
                        ${merit.transactions.map(t => `
                            <li>
                                <span>${t.date} ${linkify(t.note)}</span> 
                                <span>${formatCurrency(t.amount)}</span>
                            </li>
                        `).join('')}
                    </ul>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteMerit(${index})">ลบบันทึกบุญนี้</button>
                </div>` : ''}
            `;
            list.appendChild(li);
        });
        updateTotal();
    }

    // ฟังก์ชันการอัปโหลดบันทึกขึ้นไปเก็บบน Firebase คลาวด์
    function saveMerits() {
        if (!uid) return;
        db.ref('merit_users/' + uid + '/merits').set(merits);
    }

    // ดึงค่าบันทึกบุญเรียลไทม์จาก Firebase ของผู้ใช้นั้นๆ
    function loadMerits() {
        if (!uid) return;
        db.ref('merit_users/' + uid + '/merits').on('value', snap => {
            merits = snap.val() || [];
            renderMerits();
        });
    }

    // ฟังก์ชันในการ ย่อ/ขยาย ข้อมูลย้อนหลังของแต่ละรายการเมื่อคลิกเลือก
    window.toggleExpand = function(index) {
        merits[index].expanded = !merits[index].expanded;
        renderMerits();
    };

    // การเพิ่มกลุ่มบุญหัวข้อใหม่เข้าสู่รายการ
    document.getElementById('addMeritBtn').onclick = () => {
        if (!uid) return;
        const manualDesc = document.getElementById('manualMeritInput').value.trim();
        const selectDesc = document.getElementById('meritSelect').value;
        const desc = manualDesc || selectDesc;
        const amt = parseFloat(document.getElementById('meritAmountInput').value) || 0;

        if (!desc) {
            showToast('กรุณาเลือกหรือพิมพ์ชื่อรายการบุญครับ');
            return;
        }

        const newMerit = {
            description: desc,
            totalAmount: amt,
            transactions: [],
            expanded: false
        };

        if (amt > 0) {
            newMerit.transactions.push({ amount: amt, date: getCurrentDateTime(), note: '' });
        }

        merits.push(newMerit);
        
        // ล้างค่าข้อมูลออกจากฟอร์มทันทีที่บันทึก
        document.getElementById('manualMeritInput').value = '';
        document.getElementById('meritSelect').value = '';
        document.getElementById('meritAmountInput').value = '';
        
        saveMerits();
        renderMerits();
    };

    // การเติมเงินสะสมลงไปในกลุ่มบุญหัวข้อเดิมที่มีอยู่แล้ว
    window.updateMeritAmount = function(index) {
        if (!uid) return;
        const amtInput = document.getElementById(`addAmt${index}`);
        const descInput = document.getElementById(`addDesc${index}`);
        
        const val = parseFloat(amtInput.value);
        const note = descInput.value.trim();

        if (isNaN(val) || val <= 0) {
            showToast('กรุณากรอกจำนวนเงินให้ถูกต้องและมากกว่า 0 บาทครับ');
            return;
        }

        merits[index].totalAmount = (parseFloat(merits[index].totalAmount) || 0) + val;
        
        if (!merits[index].transactions) {
            merits[index].transactions = [];
        }
        
        merits[index].transactions.push({ 
            amount: val, 
            date: getCurrentDateTime(), 
            note: note 
        });

        amtInput.value = '';
        descInput.value = '';

        saveMerits();
        renderMerits();
    };

    // ลบรายการกลุ่มบุญหลักออกจากระบบฐานข้อมูลคลาวด์อย่างถาวร
    window.deleteMerit = function(index) {
        if (!uid) return;
        showConfirm('คุณแน่ใจหรือไม่ที่จะลบบันทึกบุญนี้อย่างถาวร?', () => {
            merits.splice(index, 1);
            saveMerits();
            renderMerits();
            showToast('ลบบันทึกบุญเรียบร้อยแล้ว');
        });
    };

    // เฝ้าสังเกตการณ์เข้าสู่ระบบของบัญชีผู้ใช้งาน (Google Auth)
    auth.onAuthStateChanged(user => {
        if (user) {
            uid = user.uid;
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('totalMeritBar').style.display = 'block'; // แสดงแถบสรุปยอดเมื่อเข้าสู่ระบบแล้วเท่านั้น
            document.getElementById('inputForm').style.display = 'flex';
            loadMerits();
        } else {
            uid = null;
            merits = [];
            renderMerits();
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('totalMeritBar').style.display = 'none'; // ซ่อนแถบสรุปยอดหากยังไม่ผ่านการยืนยันตัวตน
            document.getElementById('inputForm').style.display = 'none';
        }
    });

    // ปุ่มสำหรับดำเนินการล็อกอินและล็อกเอาท์จากแอปพลิเคชัน
    document.getElementById('loginBtn').onclick = async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider);
    };

    document.getElementById('logoutBtn').onclick = () => auth.signOut();
</script>
</body>
</html>
