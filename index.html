<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกบุญ Firebase</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{font-family:Arial,sans-serif;background:#e8f5e9;margin:0;padding:20px}
.container{max-width:700px;margin:auto;background:#fff;padding:25px;border-radius:12px}
.login-box{text-align:center;margin-bottom:15px}
button{cursor:pointer}
.google-btn{background:#4285F4;color:#fff;border:none;padding:12px 20px;border-radius:8px}
.logout-btn{background:#f44336;color:#fff;border:none;padding:8px 12px;border-radius:6px}
.total-merit-bar{background:#c8e6c9;padding:12px;border-radius:8px;margin:15px 0;font-weight:bold}
.input-section{display:flex;flex-direction:column;gap:10px}
.input-row{display:flex;gap:10px}
input,select{padding:10px}
.add-btn{background:#4caf50;color:white;border:none}
li{list-style:none;background:#f1f8e9;margin:8px 0;padding:10px;border-radius:8px}
</style>
</head>
<body>
<div class="container">
<h1>บันทึกบุญ</h1>

<div class="login-box">
<button id="loginBtn" class="google-btn">🔐 Login with Google</button>
<div id="userInfo" style="display:none">
<p>👤 <span id="userName"></span></p>
<button id="logoutBtn" class="logout-btn">Logout</button>
</div>
</div>

<div id="totalMeritBar" class="total-merit-bar">💰 ยอดบุญรวมทั้งหมด: 0 บาท</div>

<div class="input-section">
<input type="text" id="manualMeritInput" placeholder="พิมพ์ชื่อรายการบุญเอง">
<input type="number" id="meritAmountInput" placeholder="จำนวนเงิน">
<button id="addMeritBtn" class="add-btn">+ เพิ่มบุญใหม่</button>
</div>

<ul id="meritList"></ul>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBW_KT7TJAThSg29gedQurkXhcTv5ACOmg",
  authDomain: "dharma-prayer.firebaseapp.com",
  databaseURL: "https://dharma-prayer-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dharma-prayer",
  storageBucket: "dharma-prayer.firebasestorage.app",
  messagingSenderId: "4576358277",
  appId: "1:4576358277:web:17240edf90e461cb489eec"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let merits = [];
let uid = null;

function formatCurrency(a){
 return new Intl.NumberFormat('th-TH',{style:'currency',currency:'THB',minimumFractionDigits:0}).format(a);
}

function updateTotal(){
 const total = merits.reduce((s,m)=>s+m.totalAmount,0);
 document.getElementById('totalMeritBar').innerText =
 '💰 ยอดบุญรวมทั้งหมด: '+formatCurrency(total);
}

function renderMerits(){
 const list=document.getElementById('meritList');
 list.innerHTML='';
 merits.forEach((m,i)=>{
   const li=document.createElement('li');
   li.innerHTML=`<b>${i+1}. ${m.description}</b> - ${formatCurrency(m.totalAmount)}
   <button onclick="removeMerit(${i})">ลบ</button>`;
   list.appendChild(li);
 });
 updateTotal();
}

function saveMerits(){
 if(!uid) return;
 db.ref('merit_users/'+uid+'/merits').set(merits);
}

function loadMerits(){
 if(!uid) return;
 db.ref('merit_users/'+uid+'/merits').on('value',snap=>{
   merits=snap.val()||[];
   renderMerits();
 });
}

function removeMerit(i){
 merits.splice(i,1);
 saveMerits();
}

document.getElementById('addMeritBtn').onclick=()=>{
 if(!uid){ alert('กรุณา Login ก่อน'); return; }
 const desc=document.getElementById('manualMeritInput').value.trim();
 const amt=parseFloat(document.getElementById('meritAmountInput').value)||0;
 if(!desc) return;
 merits.push({description:desc,totalAmount:amt});
 saveMerits();
 document.getElementById('manualMeritInput').value='';
 document.getElementById('meritAmountInput').value='';
};

document.getElementById('loginBtn').onclick=async()=>{
 const provider=new firebase.auth.GoogleAuthProvider();
 await auth.signInWithPopup(provider);
};

document.getElementById('logoutBtn').onclick=()=>auth.signOut();

auth.onAuthStateChanged(user=>{
 if(user){
   uid=user.uid;
   document.getElementById('userName').innerText=user.displayName;
   document.getElementById('loginBtn').style.display='none';
   document.getElementById('userInfo').style.display='block';
   loadMerits();
 }else{
   uid=null;
   merits=[];
   renderMerits();
   document.getElementById('loginBtn').style.display='inline-block';
   document.getElementById('userInfo').style.display='none';
 }
});
</script>
</body>
</html>
